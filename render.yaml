services:
  - type: web
    name: zmm-backend
    env: node
    rootDir: .
    buildCommand: |
      echo "Installing backend dependencies..."
      cd backend && npm install
      echo "Installing frontend dependencies..."
      cd ../frontend && npm install
      echo "Building frontend..."
      npm run build
      echo "Build complete"
    startCommand: cd backend && node server.js
    envVars:
      - key: PORT
        value: 4000
      - key: JWT_SECRET
        value: zmm_super_secret_jwt_2025
      - key: LIVEKIT_URL
        value: wss://conference-hbqz5vdt.livekit.cloud
      - key: LIVEKIT_API_KEY
        value: APIPF4uEDAnnGcQ
      - key: LIVEKIT_API_SECRET
        value: LGZEqkjPlUgnUPNS5nSaBcZy6gnxQT0xbK6HaSZOhAC
